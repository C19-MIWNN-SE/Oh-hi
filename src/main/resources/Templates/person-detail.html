<!DOCTYPE html>
<html lang="en"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">

    <title>About me</title>
</head>
<body class="bg-light">

<nav th:replace="~{Fragments/general :: navbar}"></nav>

<div class="container mt-4">

    <div th:replace="~{fragments/flashMessage :: successMessage}"></div>
    <div th:replace="~{fragments/flashMessage :: errorMessage}"></div>
    <!--    kolom wordt hoger obv breedte card/col-x, row wordt groter obv van colommen, about me resized mee-->
    <div class="row mb-4">
        <div class="col-3">
            <div th:replace="~{fragments/person :: personCard(${person}, 'background-content-card-profile')}"></div>
            <div>
                <a th:href="@{/person/profile/edit/{id}(id=${person.id})}"
                   class="btn btn-success shadow-sm search-bg fp-btn-colour fp-btn-content"
                   sec:authorize="hasRole('STUDENT')">
                    <i class="bi bi-gear me-1"></i> Profiel bewerken
                </a>
            </div>
        </div>

        <div class="col-4">

            <div class="aboutMeText">
                <div class="col mx-auto info-background-content">
                    <h5 class="aboutMeHeader">Naam</h5>
                    <p class="aboutMeContent" th:text="${person.fullName}"></p>
                </div>

                <div class="col mx-auto info-background-content">
                    <h5 class="aboutMeHeader">Woonplaats</h5>
                    <p class="aboutMeContent" th:text="${location}"></p>
                </div>

                <div class="col mx-auto info-background-content">
                    <h5 class="aboutMeHeader">Leeftijd</h5>
                    <p class="aboutMeContent" th:text="${age}"></p>
                </div>
                <div class="col mx-auto info-background-content">
                    <h5 class="aboutMeHeader">Voornaamwoorden</h5>
                    <p class="aboutMeContent" th:text="${pronoun}"></p>
                </div>
            </div>
        </div>

        <div class="col-4">


            <div class="col mx-auto info-background-content" th:if="${person.getEmployerField()}">
                <h5 class="aboutMeHeader">Toekomstig werkgever</h5>
                <p class="aboutMeContent" th:text="${person.student?.employer}"></p>
            </div>
            <div class="col mx-auto info-background-content">
                <h5 class="aboutMeHeader">Mijn interesses</h5>
                <div class="d-flex flex-wrap gap-2 justify-content-center">
    <span th:each="interest : ${interests}"
          class="interestStyle"
          th:text="${interest.interest}">
    </span>
                </div>
            </div>
            <div class="col mx-auto info-background-content">
                <h5 class=" aboutMeHeader">Over mij</h5>
                <p class="aboutMeContent" th:text="${aboutMe}"></p>
            </div>
        </div>

        </div>
    </div>


    <div class="containerComment">
        <div class="head">
            <h1>Plaats een bericht!</h1>
        </div>
        <div><span id="comment">0</span> Berichten</div>
        <div class="text">Ik hoor graag van je!</div>
        <div class="comments"></div>
        <div class="commentBox">
            <img src="/static-images/johnny.jpg" alt="profile">
            <div class="content">
                <h2>Schrijf een bericht als</h2>
                <div class="commentInput">
                    <input type="text" placeholder="schrijf een bericht" class="usercomment">
                    <div class="buttonsComment">
                        <button type="submit" disabled id="publish">Verstuur</button>
                        <div class="notify">
                            <input type="checkbox" class="notifyInput"><span>Bericht me</span>
                        </div>

                    </div>
                </div>
                <p></p>
            </div>
        </div>

    </div>

    <script>
        const userId = {
            name: /*[[${person.fullName}]]*/ null,
            image: /*[[${person.image}]]*/ null,
            message: null,
            date: null
        }

        const usercomment = document.querySelector(".usercomment");
        const publishBtn = document.querySelector("#publish");
        const comments = document.querySelector(".comments");
        const userName = document.querySelector(".user");

        usercomment.addEventListener("input", e=> {
            if (!usercomment.value){
                publishBtn.setAttribute("disabled", "disabled");
                publishBtn.classList.remove("abled");
            } else {
                publishBtn.removeAttribute("disabled");
                publishBtn.classList.add("abled");
            }
        })
        
        function addPost(){
            
            userId.message = usercomment.value;
            userId.date = new Date().toLocaleString();
            let  published = 
                `<div class="parents">
                    <img src="${userId.image}">
                    <div>
                    <h1>${userId.name}</h1>
                    <p>${userId.message}</p>
                    <span class="date"> ${userId.date}</span>
                    </div>
                </div>`

            comments.innerHTML += published;
            usercomment.value = "";

            let commentsNum = document.querySelectorAll(".parents").length;
            document.getElementById("comment").textContent = commentsNum;
        }
        publishBtn.addEventListener("click", addPost)
    </script>
    <footer th:replace="~{Fragments/general :: footer}"></footer>
    <div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

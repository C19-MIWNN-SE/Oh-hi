<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:insert="~{Fragments/general :: baseheader(~{:: title})}">
    <title>Cohort toevoegen/bewerken</title>
</head>
<body>
<nav th:replace="~{Fragments/general :: navbar}"></nav>
<div th:replace="~{fragments/general :: formTitle(
'Groepsfoto toevoegen')}">
</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <form th:action="@{/cohort/{id}/group-photos(id=${cohort.id})}" method="post" enctype="multipart/form-data" th:object="${cohort}">

                        <div class="mb-3">
                            <label for="groupPhotoImageFile"
                                   class="form-label fw-bold">Groepsfoto
                            </label>
                            <input type="file"
                                   name="file"
                                   id="groupPhotoImageFile"
                                   accept="image/*"
                                   class="form-control"
                                   required>
                        </div>


<!--                        <h3>Select people in this photo:</h3>-->

<!--                        <div th:each="member : ${people}">-->
<!--                            <label>-->
<!--                                <input type="checkbox"-->
<!--                                       name="personIds"-->
<!--                                       th:id="${'member_' + member.id}"-->
<!--                                       th:value="${member.id}">-->
<!--                                <span th:text="${member.firstName + ' ' + member.lastName}"></span>-->
<!--                            </label>-->
<!--                        </div>-->

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Leden</label>

                            <div class="card bg-light border-0 shadow-sm rounded">
                                <div class="FormInfo card-body p-3">

                                    <div th:each="member : ${people}" class="form-check mb-1">

                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="personIds"
                                               th:id="${'member_' + member.id}"
                                               th:value="${member.id}">

                                        <label class="form-check-label ms-2"
                                               th:for="${'member_' + member.id}"
                                               th:text="${member.fullName}">
                                            Leden in deze foto
                                        </label>

                                    </div>

                                </div>
                            </div>
                        </div>

                        <p>Totaal aantal leden: <span th:text="${#lists.size(people)}"></span></p>

                        <div class="d-grid gap-2 mt-4">
                            <div th:replace="~{Fragments/general :: saveButton}"></div>
                            <a th:href="@{/cohort/{id}(id=${cohort.id})}"
                               class="btn btn-link text-secondary text-decoration-none text-center">Annuleren</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>

</body>
</html>

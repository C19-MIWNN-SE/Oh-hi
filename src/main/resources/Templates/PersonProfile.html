<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div class="row">
    <div class="col-lg-8">

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white p-3">
                <h1 class="h3 mb-0" th:text="${introText}">Person</h1>
            </div>
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h6 class="text-uppercase text-muted small fw-bold mb-1">Status op Watchlist</h6>
                        <p class="fs-5 mb-0">

                        </p>
                    </div>

                </div>

                <div th:if="${successMessage}" class="alert alert-success mt-3 mb-0" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-3 mb-0" th:text="${errorMessage}"></div>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head th:replace="~{Fragments/general :: head(${introText})}">
    <title th:text="${introText}">Film informatie</title>
</head>
<body>

<nav th:replace="~{Fragments/general :: navbar}"></nav>

<div class="row">
    <div class="col-lg-8">

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white p-3">
                <h1 class="h3 mb-0" th:text="${introText}">Person</h1>
            </div>
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h6 class="text-uppercase text-muted small fw-bold mb-1">Iets over mij</h6>
                        <p class="fs-5 mb-0" th:text="${aboutMe}"></p>
                    </div>

                </div>

                <div th:if="${successMessage}" class="alert alert-success mt-3 mb-0" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-3 mb-0" th:text="${errorMessage}"></div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>

</body>
</html>

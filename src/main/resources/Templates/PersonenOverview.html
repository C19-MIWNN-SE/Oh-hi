<!DOCTYPE html>
<html lang="en">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">
    <meta charset="UTF-8">
    <title>Profiles</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
<div class="d-flex justify-content-between align-items-center mb-4">
<!--    <div>-->
<!--        <h1 th:text="${cohort}" class="display-5 fw-bold titleLink" >Cohort group</h1>-->
<!--        <p class="text-muted" th:text="${cohortInfo}">Dit coort bevat X aantal personen</p>-->
<!--    </div>-->
    <a th:href="@{/profiles/add}" class="btn btn-success shadow-sm search-bg our-button">
        <i class="bi bi-plus-circle me-1"></i> Nieuw lid toevoegen
    </a>
</div>
<table class="PersonTable">
    <thead>
    <tr>
        <th>Image</th>
        <th>First Name</th>
        <th>Last Name</th>
    </tr>
    </thead>
<tbody>

<tr th:each="person : ${people}">
    <td><a th:href="@{/profiles/{id}(id=${person.id})}"
            th:if="${person.image != null}"
            th:src="@{/static-images/{id}(id=${person.image.id})}"
            th:alt="${person.id}"
           style="display: block;" width="100px">image goes here</a>
    </td>
    <td><a th:href="@{/profiles/{id}(id=${person.id})}" th:text="${person.firstName}">First Name</a></td>
    <td th:text="${person.infix}">Middle Name</td>
    <td th:text="${person.lastName}">Last Name</td>
    <td th:text="${person.userRole}">Role</td>
</tr>
</tbody>
</table>
<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

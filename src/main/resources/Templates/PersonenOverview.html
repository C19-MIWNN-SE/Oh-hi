<!DOCTYPE html>
<html lang="en">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">
    <meta charset="UTF-8">
    <title>Profiles</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
<table class="PersonTable">
    <thead>
    <tr>
        <th>Image</th>
        <th>First Name</th>
        <th>Last Name</th>
    </tr>
    </thead>
<tbody>

<tr th:each="person : ${people}">
    <td class = "PersonImageHolder"><img class="MiniPic" th:if="${person.image != null}"
                                          th:src="@{/static-images/{id}(id=${person.image.id})}"
                                          th:alt="${person.id}">
    </td>
    <td  class="PersonImageHolder">
        <img class="MiniPic" th:unless="${person.image != null}"
                                th:src="@{/static-images/teaspoon-steel-isolated-picture-id520537085.jpg}"
             alt="picture of a spoon"></td>
    <td><a th:href="@{/profiles/{id}(id=${person.id})}" th:text="${person.firstName}">First Name</a></td>
    <td th:text="${person.infix}">Middle Name</td>
    <td th:text="${person.lastName}">Last Name</td>
    <td th:text="${person.userRole}">Role</td>
</tr>
</tbody>
</table>
<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">
    <meta charset="UTF-8">
    <title>Profiles</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>


<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
<!--                <div class="card-header bg-dark text-white p-3 text-center">-->
<!--                    <h2 class="h4 mb-0" th:text="${film.id == null ? 'Nieuwe Film Toevoegen' : 'Film Bewerken'}">Film Formulier</h2>-->
<!--                </div>-->

                <div class="card-body p-4">
                    <form th:action="@{/profiles/save}" th:object="${person}"
                          method="post"
                          enctype="multipart/form-data">

<!--                        <input type="hidden" th:field="*{id}">-->

                        <div class="mb-3">
                            <label for="firstName" class="form-label fw-bold">Voornaam</label>
                            <input type="text" id="firstName" th:field="*{firstName}"
                                   class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" placeholder="Voornaam">




                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>

                        </div>
                        <div class="mb-3">
                            <label for="infix" class="form-label fw-bold">Tussenvoegsel</label>
                            <input type="text" id="infix" th:field="*{infix}"
                                   class="form-control" placeholder="Tussenvoegsel">

                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label fw-bold">Achternaam</label>
                            <input type="text" id="lastName" th:field="*{lastName}"
                                   class="form-control" placeholder="Achternaam">

                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Rol</label>
                            <div class="card bg-light border-0 shadow-sm rounded">
                                <div class="card-body p-3" style="max-height: 200px; overflow-y: auto;">

                                    <div th:each="role : ${T(nl.miwnn.cohort._9.OHI.Model.Person.Role).values()}">
                                        <label>
                                            <input class="form-check-input"
                                                   type="radio"
                                                   th:field="*{userRole}"
                                                   th:value="${role}"
                                                   th:id="${'role_' + role}">
                                        </label>
                                        <label class="form-check-label ms-2"
                                               th:for="${'role_' + role}"
                                               th:text="${role.displayName}">
                                        </label>
                                    </div>

                                    <input type="hidden" name="_person" value="on"/>




                                </div>
                            </div>

                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button class="btn btn-primary btn-lg shadow-sm" type="submit">
                                <i class="bi bi-save"></i> Lid opslaan
                            </button>
                            <a href="/profiles" class="btn btn-link text-secondary text-decoration-none text-center">Annuleren</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

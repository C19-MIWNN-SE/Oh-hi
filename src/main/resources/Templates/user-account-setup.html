<!DOCTYPE html>
<html lang="en">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">
    <meta charset="UTF-8">
    <title>Account Setup</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div th:replace="~{fragments/general :: formTitle(
'Account aanmaken')}">
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form th:action="@{/person/account/setup}" method="post">

                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Gebruikersnaam</label>
                            <input type="text" id="username"
                                   name="username"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Wachtwoord</label>
                            <input type="text" id="password"
                                   name="password"
                                   class="form-control">
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <div th:replace="~{Fragments/general :: saveButton}"></div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

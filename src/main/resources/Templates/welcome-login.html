<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Fragments/general :: baseheader(~{:: title})}">
    <title>Welkom</title>
</head>
<body class="loginBackground">
<nav th:replace="~{Fragments/general :: navbar}"></nav>

<div class="container mt-5 mb-5">
    <!-- align-items-center zorgt voor verticale uitlijning tussen links en rechts -->
    <div class="row align-items-center">

        <!-- Linker kolom: Wit blok met tekst -->
        <!-- offset-md-1 zorgt voor de marge aan de linkerkant van het scherm -->
        <div class="col-md-5 offset-md-1 loginTextBackground">
            <div class="loginTextContent">
                <h1 class="headerLogin">Oh hi, gebruiker!</h1>
                <p class="loginTextStyle">
                    Jouw cohort, op één plek. Bekijk je medestudenten en docenten, ontdek wie je
                    klasgenoten zijn en zet jezelf op de kaart. Want een gezicht bij een naam maakt
                    alles net wat makkelijker.
                </p>
                <div class="d-flex gap-3">
                    <img th:src="@{/static-images/Docent1.png}" class="circleImage" alt="foto1">
                    <img th:src="@{/static-images/Docent2.png}" class="circleImage" alt="foto2">
                    <img th:src="@{/static-images/Docent3.png}" class="circleImage" alt="foto3">
                </div>
            </div>
        </div>

        <!-- Rechter kolom: Login formulier -->
        <!-- ps-md-5 zorgt voor de witruimte tussen het witte blok en de login -->
        <div class="col-md-5 ps-md-10 loginForm">
            <div class="text-center mb-6">
                <h1>Login</h1>
            </div>

            <div th:if="${param.error}" class="alert alert-danger p-2 small">
                Invalid username and password.
            </div>
            <div th:if="${param.logout}" class="alert alert-info p-2 small">
                You have been logged out.
            </div>

            <form th:action="@{/userlogin}" method="post">
                <div class="mb-3">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Gebruikersnaam" required/>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Wachtwoord" required/>
                </div>
                <div class="mt-4">
                    <input type="submit" id="submitbtn" class="btn btn-primary w-100" value="Log in"/>
                </div>
            </form>
        </div>

    </div>
</div>

<footer th:replace="~{Fragments/general :: footer}"></footer>
<div th:replace="~{Fragments/general :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:fragment="personCard(person, extraClass)">

    <div class="ratio w-100" style="--bs-aspect-ratio: 140%;">

        <div class="d-flex flex-column align-items-center shadow-sm background-content-card background-style-card"
             th:classappend="${extraClass != null ? extraClass : ''}">

            <div class="mb-2 image-content">
                <img class="MiniPic img-fluid rounded person-image image-content"
                     th:src="${person.image != null} ? '/images/' + ${person.image.id} : '/static-images/teaspoon-steel-isolated-picture-id520537085.jpg'"
                     style="height: 180px; width: 180px; object-fit: cover;"
                     alt="profile image of person">
            </div>

            <div class="text-center">
                <div class="name-style"
                     th:text="${person.fullName}">
                </div>

                <div>
                    <div class="roleDisplay"
                         th:text="${person.userRole.displayName}">
                    </div>
                </div>

                <div class="mb-3">
                    <i class="bi bi-geo-alt-fill"></i>
                    <div class="location-text"
                         th:text="${person.location}">
                    </div>
                </div>


            </div>

            <div class="position-absolute bottom-0 end-0 p-2 delete-button"
                 style="z-index: 5;"
                 sec:authorize="hasRole('DOCENT')">
                <a th:href="@{/person/remove/{id}(id=${person.id})}"
                   class="btn btn-sm btn-outline-danger text-center"
                   onclick="return confirm('Weet je zeker?')">
                    <i class="bi bi-trash"></i>
                </a>
            </div>

        </div>
    </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:fragment="personCard(person, extraClass)">
    <div class="shadow-sm background-content-card p-3 position-relative card-background"
         th:classappend="${(extraClass != null ? extraClass : '') + (person.userRole.name() == 'TEACHER' ? ' docent-card' : '')}">

        <div th:if="${extraClass != null && extraClass.contains('background-content-card-profile')}"
             class="d-flex flex-column align-items-center text-center w-100 py-3 ">
            <img class="rounded-circle mb-3"
                 th:src="${person.image != null} ? '/images/' + ${person.image.id} : '/static-images/noImage.jpg'"
                 style="height: 130px; width: 130px; object-fit: cover; border: 2px solid white;"
                 alt="profile image">
            <div class="name-style fw-bold" th:text="${person.fullName}"></div>
            <div class="roleDisplay" th:text="${person.userRole.displayName}"></div>
            <div class="d-flex align-items-center mt-1">
                <i class="bi bi-geo-alt-fill text-primary me-1"></i>

            </div>
            <div class="d-flex align-items-center mt-1">
                <span class="location-text" th:text="${person.location}"></span>
            </div>
        </div>

        <div th:if="${extraClass == null || !extraClass.contains('background-content-card-profile')}"
             class="row align-items-center g-0 card-overview-page ">
            <div class="col-auto">
                <img class="rounded-circle"
                     th:src="${person.image != null} ? '/images/' + ${person.image.id} : '/static-images/noImage.jpg'"
                     style="height: 100px; width: 100px; object-fit: cover; border: 2px solid white;"
                     alt="profile image">
            </div>
            <div class="col-auto mx-3" style="width: 1px; height: 80px; background-color: #333; opacity: 0.6;"></div>
            <div class="col card-text">
                <div class="card-text" th:text="${person.fullName}"></div>
                <div class="roleDisplay" th:text="${person.location}"></div>

            </div>
        </div>

        <div class="position-absolute bottom-0 end-0 p-2"
             th:if="${extraClass == null || !extraClass.contains('background-content-card-profile')}"
             sec:authorize="hasRole('DOCENT')">
            <a th:href="@{/person/remove/{id}(id=${person.id})}"
               class="btn btn-sm text-danger border-0"
               onclick="return confirm('Weet je zeker?')">
                <i class="bi bi-trash"></i>
            </a>
        </div>

    </div>
</div>
</body>
</html>
